name = "wildmat-personality"
main = "src/index.ts"
compatibility_date = "2025-02-12"
compatibility_flags = ["nodejs_compat"]

# The R2 binding and LLM secrets are gone — engine code now lives in the
# personality repo and runs as a container behind personality.wildmat.dev.
# This worker is now a thin HTTP proxy. See packages/personality/CROSS_REPO.md.
[vars]
ENVIRONMENT = "production"
PERSONALITY_SERVICE_BASE_URL = "https://personality.wildmat.dev"

[[routes]]
pattern = "api.wildmat.dev/personality/*"
zone_name = "wildmat.dev"

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
